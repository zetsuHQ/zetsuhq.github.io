<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zetsu's personal blog</title>
    <link rel="stylesheet" href="../style/writeups.css">
</head>

<body>
    <header id="header">
        <div id="header-container">
            <nav id="navbar">
                <a href="/">Home</a>
                <div id="content-links">
                    <a href="#">Writeups</a>
                    <!-- <a href="posts">Posts</a> -->
                </div>
            </nav>
        </div>
    </header>

    <section id="content">
        <div class="item">
            <a href="../writeups/portswigger/">
                <img class="item-image" src="../assets/portswigger.png" alt="PortSwigger logo">
            </a>
            <a class="item-link" href="../writeups/portswigger/">PortSwigger</a>
        </div>
        <div class="item">
            <a class="item-image-link" href="../writeups/hackthebox/">
                <img class="item-image" src="../assets/hackthebox-green.png" alt="HackTheBox logo">
            </a>
            <a class="item-link" href="../writeups/hackthebox/">HackTheBox</a>
        </div>
    </section>

    <div id="footer">
        <div id="footer-container">
            <div id="main-footer-block">
                <nav>
                    <!-- need to make these links work. it's supposed to be <a> tag -->
                    <button class="social-link">
                        <div class="img-container">
                            <img src="../assets/bxl-github.svg" alt="Github" title="Github">
                        </div>
                    </button>
                    <button class="social-link">
                        <div class="img-container"></div>
                        <img src="../assets/hackthebox-svgrepo-com.svg" alt="HackTheBox" title="HackTheBox">
                    </button>
                    <button class="social-link">
                        <img src="../assets/bxl-linkedin-square.svg" alt="LinkedIn" title="LinkedIn">
                    </button>
                </nav>
            </div>
        </div>
    </div>
</body>
</html>
